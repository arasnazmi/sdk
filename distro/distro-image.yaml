{{/* Phase 3: Disk image creation */}}
{{/* Resumes from: checkpoint-config-{type}-{base}-{suite}-{machine}.tar.gz */}}
{{/* Run standalone: task distro:build:image */}}

{{- $arch := or .arch "arm64" -}}
{{- $machine := or .machine "t3-gem-o1" -}}
{{- $base := or .base "ubuntu" -}}
{{- $type := or .type "minimal" -}}
{{- $suite := or .suite "jammy" -}}
{{- $release := or .release "v2026.2" -}}
{{- $workdir := or .workdir "/home/workdir" -}}
{{- $image := or .image (printf "gemstone-%s-%s-%s-%s-%s.img" $type $release $base $suite $machine) -}}
{{- $imagepath := or .imagepath (printf "%s/build/debos/%s" $workdir $image) -}}
{{- $imagesize := or .imagesize "4096M" -}}
{{- $checkpoint_config := printf "checkpoint-config-%s-%s-%s-%s.tar.gz" $type $base $suite $machine -}}

architecture: {{ $arch }}

actions:

  - action: unpack
    description: Restore config checkpoint
    file: {{ $checkpoint_config }}

  - action: image-partition
    imagename: {{ $image }}
    imagesize: {{ $imagesize }}
{{ if eq $machine "beagley-ai" "t3-gem-o1" "qemuarm64" }}
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot
        partition: BOOT
    partitions:
      - name: BOOT
        fs: vfat
        start: 1MiB
        end: 129MiB
        extendedoptions: [-g, 16/32, -h, 0]
        flags: [boot, lba]
        parttype: 0C
      - name: root
        fs: btrfs
        start: 129MiB
        end: 100%
        parttype: 83
{{ else if eq $arch "amd64" }}
    partitiontype: gpt
    partitions:
      - name: efi
        fs: vfat
        start: 0%
        end: 50MB
        options: [ x-systemd.automount ]
      - name: root
        fs: ext4
        start: 50MB
        end: 100%
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot/efi
        partition: efi
        flags: [ boot ]
{{ end }}

  - action: filesystem-deploy
    description: Deploying filesystem onto image
