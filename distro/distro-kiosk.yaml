{{- $arch := or .arch "arm64" -}}

architecture: {{ $arch }}

actions:

  - action: apt
    recommends: false
    packages:
      - kmscube
      - libdrm-dev
      - libxcb-cursor0
      - openbox
      - python3-pyqt5
      - python3-pyqtgraph
      - whiptail
      - x11-xserver-utils
      - xinit
      - xserver-xorg-core
      - xserver-xorg-input-all
