[greeter]
background = /usr/share/backgrounds/t3-gemstone/t3-gemstone-teknofest.jpg
theme-name = T3-Gemstone
icon-theme-name = T3-Gemstone
font-name = Noto Sans 16
cursor-theme-name = Adwaita
cursor-theme-size = 28
indicators = ~host;~spacer;~session;~clock;~power;~keyboard;~a11y
user-background = true
hide-user-image = true
position = 50%,center 40%,center
screensaver-timeout = 0
keyboard = onboard
a11y-states = keyboard

[keyboard]
reader = onboard

[accessibility]
screen-reader = false
