###############################################################################
# Kernel
###############################################################################

kernel.exec-shield = 1
kernel.kexec_load_disabled = 1
kernel.pid_max = 65536

# Kernel pointer ve sembol bilgilerini gizle
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

# perf erisimini kisitla
kernel.perf_event_paranoid = 3

# ptrace: yalnizca parent-child iliskisine izin ver
kernel.yama.ptrace_scope = 2

# SysRq komutlarini kisitla (sadece sync+remount)
kernel.sysrq = 0

# Core dump'lari devre disi birak
kernel.core_uses_pid = 1
fs.suid_dumpable = 0

###############################################################################
# Bellek
###############################################################################

# Tam ASLR
kernel.randomize_va_space = 2

# mmap minimum adresi
vm.mmap_min_addr = 65536

###############################################################################
# Ag — IPv4
###############################################################################

# IP forwarding kapali
net.ipv4.ip_forward = 0

# Source routing reddet
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# ICMP redirect kabul etme
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# ICMP redirect gonderme
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Broadcast ICMP'yi yok say
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Sahte hata mesajlarini yok say
net.ipv4.icmp_ignore_bogus_error_responses = 1

# SYN flood korumasi
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2

# Ters yol dogrulamasi
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# TCP timestamps (bilgi sizintisini azalt)
net.ipv4.tcp_timestamps = 0

# TIME_WAIT yeniden kullanimini kisitla
net.ipv4.tcp_rfc1337 = 1

###############################################################################
# Ag — IPv6
###############################################################################

net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

###############################################################################
# Dosya sistemi
###############################################################################

# Sembolik link takibini kisitla
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# prevent the automatic loading of line disciplines
# https://lore.kernel.org/patchwork/patch/1034150
dev.tty.ldisc_autoload = 0

# prevents processes from creating new io_uring instances
# https://security.googleblog.com/2023/06/learnings-from-kctf-vrps-42-linux.html
kernel.io_uring_disabled = 2

# harden the BPF JIT compiler and restrict unprivileged use of BPF
# https://www.zerodayinitiative.com/advisories/ZDI-20-350
# https://lwn.net/Articles/660331
net.core.bpf_jit_harden = 2
kernel.unprivileged_bpf_disabled = 1

# disable unprivileged user namespaces
# https://lwn.net/Articles/673597
# (these two values are redundant, but not all kernels support the first one)
# kernel.unprivileged_userns_clone=0
# user.max_user_namespaces=0
