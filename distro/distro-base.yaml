{{/* Phase 1: OS bootstrap and package installation */}}
{{/* Saves checkpoint: checkpoint-base-{type}-{base}-{suite}-{machine}.tar.gz */}}
{{/* Run standalone: task distro:build:base */}}

{{- $arch := or .arch "arm64" -}}
{{- $machine := or .machine "t3-gem-o1" -}}
{{- $base := or .base "ubuntu" -}}
{{- $type := or .type "minimal" -}}
{{- $suite := or .suite "jammy" -}}
{{- $workdir := or .workdir "/home/workdir" -}}
{{- $checkpoint := printf "checkpoint-base-%s-%s-%s-%s.tar.gz" $type $base $suite $machine -}}

architecture: {{ $arch }}

actions:

  - action: debootstrap
    suite: {{ $suite }}
    variant: minbase
    keyring-file: /usr/share/keyrings/{{ $base }}-archive-keyring.gpg
{{ if eq $base "debian" }}
    components: [ main, contrib ]
    mirror: https://deb.debian.org/debian
{{ else if eq $base "pardus" }}
    components: [ main, non-free, contrib ]
    mirror: https://depo.pardus.org.tr/pardus
    suite: {{ $suite }}-deb
{{ else }}
    components: [ main, multiverse, universe ]
    mirror: {{ if eq $arch "amd64" }}'https://archive.ubuntu.com/ubuntu'{{ else }}'https://ports.ubuntu.com/ubuntu-ports'{{ end }}
{{ end }}

{{ if eq $base "pardus" }}

  - action: download
    url: {{ if eq $suite "yirmibes" }}'https://depo.pardus.org.tr/pardus/pool/main/p/pardus-archive-keyring/pardus-archive-keyring_2025.1_all.deb'{{ else }}'https://depo.pardus.org.tr/pardus/pool/main/p/pardus-archive-keyring/pardus-archive-keyring_2021.1_all.deb'{{ end }}
    name: pardus_archive_keyring
    filename: pardus_archive_keyring.deb

  - action: overlay
    description: Copy downloaded Pardus archive keyring
    origin: pardus_archive_keyring
    destination: /pardus_archive_keyring.deb

  - action: run
    chroot: true
    command: |
      DEBIAN_FRONTEND=noninteractive dpkg -i /pardus_archive_keyring.deb
      rm -f /pardus_archive_keyring.deb

  - action: run
    chroot: true
    script: scripts/all/setup-pardus.sh {{ $suite }}

{{ end }}

  - action: run
    description: Speed up dpkg/apt under QEMU emulation
    chroot: true
    command: |
      echo 'force-unsafe-io' > /etc/dpkg/dpkg.cfg.d/00-unsafe-io
      echo 'man-db man-db/auto-update boolean false' | debconf-set-selections
      echo 'APT::Acquire::Queue-Mode "host";'        > /etc/apt/apt.conf.d/00parallel
      echo 'APT::Acquire::http::Pipeline-Depth 5;'  >> /etc/apt/apt.conf.d/00parallel

  - action: apt
    recommends: false
    packages: [ apt-utils, eatmydata ]

  - action: run
    description: Configure eatmydata for subsequent apt/dpkg calls
    chroot: true
    command: |
      echo 'DPkg::Pre-Invoke  { "export LD_PRELOAD=/usr/lib/libeatmydata/libeatmydata.so"; };' \
        > /etc/apt/apt.conf.d/00eatmydata
      echo 'DPkg::Post-Invoke { "unset LD_PRELOAD || true"; };' \
        >> /etc/apt/apt.conf.d/00eatmydata

  - action: apt
    recommends: false
    packages:
      - bash-completion
      - bluez
      - ca-certificates
      - can-utils
      - console-setup
      - coreutils
      - curl
      - dialog
      - dnsmasq-base
      - dosfstools
      - ethtool
      - file
      - fuse
      - gawk
      - gnupg
      - gpg
      - gpiod
      - htop
      - hwinfo
      - i2c-tools
      - iptables-persistent
      - iputils-ping
      - isc-dhcp-client
      - kmod
      - less
      - locales
      - lrzsz
      - mc
      - nano
      - netfilter-persistent
      - network-manager
      - openssh-server
      - openssl
      - python3
      - rsync
      - spi-tools
      - ssh
      - sudo
      - systemd
      - tar
      - tree
      - tzdata
      - udev
      - unzip
      - usbutils
      - uuid-runtime
      - vim-tiny
      - wget
      - wpasupplicant
      - zip

  - action: apt
    recommends: false
    packages: [ iwd, systemd-timesyncd ]

{{ if eq $suite "noble" "bookworm" "yirmiuc" "yirmibes" }}
  - action: apt
    recommends: false
    packages: [ systemd-resolved ]
{{ end }}

{{ if eq $type "kiosk" }}
  - action: apt
    recommends: false
    packages:
      - kmscube
      - libdrm-dev
      - libxcb-cursor0
      - openbox
      - python3-pyqt5
      - python3-pyqtgraph
      - whiptail
      - x11-xserver-utils
      - xinit
      - xserver-xorg-core
      - xserver-xorg-input-all
{{ end }}

{{ if eq $type "tablet" }}

{{ if eq $base "pardus" }}

  - action: run
    chroot: true
    command: |
      cat <<EOF > /etc/apt/preferences.d/02-pardus-priority
      Package: *
      Pin: release o=Pardus
      Pin-Priority: 1002
      EOF

{{ end }}

  - action: run
    chroot: true
    command: |
      cat <<EOF > /etc/apt/preferences.d/01-mobian-priority
      Package: *phosh*
      Pin: release o=mobian
      Pin-Priority: 1001
      EOF

  - action: run
    description: Add Mobian apt key and repo
    chroot: true
    command: |
      curl -fsSL https://repo.mobian-project.org/mobian.gpg -o /usr/share/keyrings/mobian-archive-keyring.gpg
      echo "deb [signed-by=/usr/share/keyrings/mobian-archive-keyring.gpg] https://repo.mobian-project.org trixie main" > /etc/apt/sources.list.d/mobian.list
      apt-get update -y -qq

  - action: apt
    recommends: true
    packages:
{{ if eq $suite "yirmibes" }}
      - gnome-shell-common=48.7-0+deb13u2
      - gnome-shell=48.7-0+deb13u2
{{ end }}
      - mobian-phone-base
      - mobian-phosh
      - mobian-phosh-phone
      - mobian-tweaks-common
      - mobian-tweaks-phosh
      - phoc
      - phosh-mobile-settings
      - phosh-plugins

  - action: apt
    recommends: false
    packages:
      - auditd
      - chatty
      - dconf-cli
      - endeavour
      - epiphany-browser
      - errands
      - evince
      - feedbackd
      - flatpak
      - geary
      - gdm3
      - gnome-console
      - gnome-calculator
      - gnome-calendar
      - gnome-calls
      - gnome-clocks
      - gnome-contacts
      - gnome-control-center
      - gnome-maps
      - gnome-photos
      - gnome-settings-daemon
      - gnome-text-editor
      - gsettings-desktop-schemas
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - iio-sensor-proxy
      - kmscube
      - libdrm-dev
      - libinput-bin
      - libinput-tools
      - lollypop
      - loupe
      - megapixels
      - mobian-multimedia
      - mobian-phosh-extras
      - modemmanager
      - nautilus
      - network-manager-gnome
      - nftables
      - phosh-pim
      - pipewire
      - pipewire-pulse
      - policycoreutils
      - selinux-basics
      - selinux-policy-default
      - selinux-utils
      - totem
      - upower
      - wayland-utils
      - wlr-randr
      - xdg-desktop-portal
      - xdg-desktop-portal-gnome
      - xwayland

{{ if eq $base "pardus" }}
  - action: apt
    recommends: true
    packages:
      - blanket
      - firefox-esr
      - firefox-esr-mobile-config
      - squeekboard
{{ end }}

{{ end }}

{{ if eq $type "desktop" }}

{{ if eq $suite "jammy" "noble" }}
  - action: apt
    recommends: false
    packages: [ adwaita-icon-theme-full ]
{{ end }}

  - action: apt
    recommends: true
    packages:
      - atril
      - catfish
      - libxfce4ui-utils
      - lightdm
      - lightdm-gtk-greeter
      - mousepad
      - network-manager
      - parole
      - ristretto
      - thunar
      - thunar-archive-plugin
      - xfce4-appfinder
      - xfce4-indicator-plugin
      - xfce4-panel
      - xfce4-pulseaudio-plugin
      - xfce4-session
      - xfce4-settings
      - xfce4-taskmanager
      - xfce4-terminal
      - xfce4-xkb-plugin
      - xfconf
      - xfdesktop4
      - xfwm4
      - xterm

  - action: apt
    recommends: false
    packages:
      - at-spi2-core
      - baobab
      - dbus-x11
      - engrampa
      - fonts-inter
      - fonts-inter-variable
      - fonts-jetbrains-mono
      - fonts-noto-core
      - kmscube
      - libdrm-dev
      - mate-calc
      - network-manager-gnome
      - whiptail
      - xcape

{{ if ne $suite "yirmibes" }}
  - action: apt
    recommends: false
    packages: [ software-properties-common ]
{{ end }}

  - action: run
    description: Install PiXflat theme from deb
    chroot: true
    command: |
      cd $(mktemp -d)
      wget http://archive.raspberrypi.org/debian/pool/main/p/pixflat-icons/pixflat-icons_0.26_all.deb
      DEBIAN_FRONTEND=noninteractive apt-get install -y ./pixflat-icons_0.26_all.deb

{{ end }}

  - action: pack
    description: Save base checkpoint
    file: {{ $checkpoint }}
