version: '3'

includes:
  yocto:
    taskfile: ../yocto
    internal: true

tasks:

  permissions:
    internal: true
    cmds:
      - sudo mkdir -p {{ .IMG_DEPLOY_DIR }}
      - sudo chown $USER:$USER {{ .IMG_DEPLOY_DIR }}
      - chmod +x {{ .WORKDIR }}/distro/scripts/*/*.sh

  _debos:
    internal: true
    cmds:
      - sudo mkdir -p /run/debos
      - cd /run/debos &&
          sudo debos
            --disable-fakemachine
            --debug-shell
            --artifactdir={{ .IMG_DEPLOY_DIR }}
            --scratchdir={{ .IMG_DEPLOY_DIR }}
            --rootdir=/run/debos
            --template-var="workdir:{{ .WORKDIR }}"
            --template-var="machine:{{ .MACHINE }}"
            --template-var="base:{{ .DISTRO_BASE }}"
            --template-var="type:{{ .DISTRO_TYPE }}"
            --template-var="suite:{{ .DISTRO_SUITE }}"
            --template-var="release:{{ .IMG_RELEASE }}"
            --template-var="image:{{ .IMG_FILE_NAME }}"
            --template-var="imagepath:{{ .IMG_FILE_PATH }}"
            --template-var="imagesize:{{ .IMG_SIZE }}"
            --template-var="arch:{{ .DISTRO_ARCH }}"
            {{ .WORKDIR }}/distro/{{ .RECIPE }} 2>&1 | tee -a {{ .IMG_DEPLOY_DIR }}/log.txt

  build:
    cmds:
      - task: permissions
      - task: yocto:local-apt-server
      - sudo mkdir -p /run/debos
      - cd /run/debos &&
          sudo debos
            --disable-fakemachine
            --debug-shell
            --artifactdir={{ .IMG_DEPLOY_DIR }}
            --scratchdir={{ .IMG_DEPLOY_DIR }}
            --rootdir=/run/debos
            --template-var="workdir:{{ .WORKDIR }}"
            --template-var="machine:{{ .MACHINE }}"
            --template-var="base:{{ .DISTRO_BASE }}"
            --template-var="type:{{ .DISTRO_TYPE }}"
            --template-var="suite:{{ .DISTRO_SUITE }}"
            --template-var="release:{{ .IMG_RELEASE }}"
            --template-var="image:{{ .IMG_FILE_NAME }}"
            --template-var="imagepath:{{ .IMG_FILE_PATH }}"
            --template-var="imagesize:{{ .IMG_SIZE }}"
            --template-var="arch:{{ .DISTRO_ARCH }}"
            {{ .WORKDIR }}/distro/distro.yaml 2>&1 | tee -a {{ .IMG_DEPLOY_DIR }}/log.txt
      - sudo chown $USER:$USER {{ .IMG_FILE_PATH }}*
    requires:
      vars:
        - name: MACHINE
          enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, qemuarm64 ]
        - name: DISTRO_BASE
          enum: [ ubuntu, debian, pardus ]
        - name: DISTRO_TYPE
          enum: [ minimal, kiosk, desktop, tablet ]
        - name: DISTRO_ARCH
          enum: [ arm64, amd64 ]
        - name: DISTRO_SUITE
          enum:
            - jammy     # Ubuntu 22
            - noble     # Ubuntu 24
            - bullseye  # Debian 11
            - bookworm  # Debian 12
            - yirmiuc   # Pardus 23
            - yirmibes  # Pardus 25

  build:phased:
    desc: Full build base → config → image (checkpoints saved between phases)
    cmds:
      - task: build:base
      - task: build:config
      - task: build:image
    requires:
      vars:
        - name: MACHINE
          enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, qemuarm64 ]
        - name: DISTRO_BASE
          enum: [ ubuntu, debian, pardus ]
        - name: DISTRO_TYPE
          enum: [ minimal, kiosk, desktop, tablet ]
        - name: DISTRO_ARCH
          enum: [ arm64, amd64 ]
        - name: DISTRO_SUITE
          enum:
            - jammy
            - noble
            - bullseye
            - bookworm
            - yirmiuc
            - yirmibes

  build:base:
    desc: "Phase 1 — Bootstrap OS and install packages, saves checkpoint-base-*.tar.gz"
    cmds:
      - task: permissions
      - task: yocto:local-apt-server
      - task: _debos
        vars: { RECIPE: distro-base.yaml }
    requires:
      vars:
        - name: MACHINE
          enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, qemuarm64 ]
        - name: DISTRO_BASE
          enum: [ ubuntu, debian, pardus ]
        - name: DISTRO_TYPE
          enum: [ minimal, kiosk, desktop, tablet ]
        - name: DISTRO_ARCH
          enum: [ arm64, amd64 ]
        - name: DISTRO_SUITE
          enum:
            - jammy
            - noble
            - bullseye
            - bookworm
            - yirmiuc
            - yirmibes

  build:config:
    desc: "Phase 2 — Configure system, resumes from checkpoint-base-*.tar.gz, saves checkpoint-config-*.tar.gz"
    cmds:
      - task: permissions
      - task: yocto:local-apt-server
      - task: _debos
        vars: { RECIPE: distro-config.yaml }
    requires:
      vars:
        - name: MACHINE
          enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, qemuarm64 ]
        - name: DISTRO_BASE
          enum: [ ubuntu, debian, pardus ]
        - name: DISTRO_TYPE
          enum: [ minimal, kiosk, desktop, tablet ]
        - name: DISTRO_ARCH
          enum: [ arm64, amd64 ]
        - name: DISTRO_SUITE
          enum:
            - jammy
            - noble
            - bullseye
            - bookworm
            - yirmiuc
            - yirmibes

  build:image:
    desc: "Phase 3 — Create disk image, resumes from checkpoint-config-*.tar.gz"
    cmds:
      - task: _debos
        vars: { RECIPE: distro-image.yaml }
      - sudo chown $USER:$USER {{ .IMG_FILE_PATH }}*
    requires:
      vars:
        - name: MACHINE
          enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, qemuarm64 ]
        - name: DISTRO_BASE
          enum: [ ubuntu, debian, pardus ]
        - name: DISTRO_TYPE
          enum: [ minimal, kiosk, desktop, tablet ]
        - name: DISTRO_ARCH
          enum: [ arm64, amd64 ]
        - name: DISTRO_SUITE
          enum:
            - jammy
            - noble
            - bullseye
            - bookworm
            - yirmiuc
            - yirmibes

  build:all:ubuntu:
    cmds:
      - for:
          matrix:
            SUITE: [ "jammy", "noble" ]
            TYPE: [ "minimal", "kiosk", "desktop" ]
        cmd: |
          unset MACHINE
          task distro:build MACHINE={{.MACHINE}} DISTRO_BASE=ubuntu DISTRO_TYPE={{.ITEM.TYPE}} DISTRO_SUITE={{.ITEM.SUITE}}

  build:all:debian:
    cmds:
      - for:
          matrix:
            SUITE: [ "bullseye", "bookworm" ]
            TYPE: [ "minimal", "kiosk", "desktop" ]
        cmd: |
          unset MACHINE
          task distro:build MACHINE={{.MACHINE}} DISTRO_BASE=debian DISTRO_TYPE={{.ITEM.TYPE}} DISTRO_SUITE={{.ITEM.SUITE}}

  build:all:pardus:
    cmds:
      - for:
          matrix:
            SUITE: [ "yirmiuc", "yirmibes" ]
            TYPE: [ "minimal", "kiosk", "desktop" ]
        cmd: |
          unset MACHINE
          task distro:build MACHINE={{.MACHINE}} DISTRO_BASE=pardus DISTRO_TYPE={{.ITEM.TYPE}} DISTRO_SUITE={{.ITEM.SUITE}}

  build:all:
    desc: Build every machine and distro
    cmds:
      - for:
          matrix:
            DISTRO: [ "ubuntu", "debian", "pardus" ]
            MACHINE: [ "beagley-ai", "intel-corei7-64", "t3-gem-o1", "qemuarm64" ]
        cmd: 'task distro:build:all:{{.ITEM.DISTRO}} MACHINE={{.ITEM.MACHINE}}'

  build:all:t3-gem-o1:
    desc: Build distro for t3-gem-o1 machine
    cmds:
      - for:
          matrix:
            DISTRO: [ "ubuntu", "debian", "pardus" ]
        cmd: 'task distro:build:all:{{.ITEM.DISTRO}} MACHINE=t3-gem-o1'
