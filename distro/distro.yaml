{{/* https://github.com/go-debos/debos */}}
{{/* https://github.com/go-debos/debos-recipes */}}
{{/* https://pkg.go.dev/github.com/go-debos/debos/actions */}}
{{/* https://golang.org/pkg/text/template */}}

{{- $arch := or .arch "arm64" -}}
{{- $machine := or .machine "t3-gem-o1" -}}
{{- $base := or .base "ubuntu" -}}
{{- $type := or .type "minimal" -}}
{{- $suite := or .suite "jammy" -}}
{{- $release := or .release "v2026.2" -}}
{{- $workdir := or .workdir "/home/workdir" -}}
{{- $image := or .image (printf "gemstone-%s-%s-%s-%s-%s.img" $type $release $base $suite $machine) -}}
{{- $imagepath := or .imagepath (printf "%s/build/debos/%s" $workdir $image) -}}
{{- $imagesize := or .imagesize "4096M" -}}
{{- $ci := or .ci "false" -}}

architecture: {{ $arch }}

actions:

  - action: debootstrap
    suite: {{ $suite }}
    variant: minbase
    keyring-file: /usr/share/keyrings/{{ $base }}-archive-keyring.gpg
{{ if eq $base "debian" }}
    components: [ main, contrib ]
    mirror: https://deb.debian.org/debian
{{ else if eq $base "pardus" }}
    components: [ main, non-free, contrib ]
    mirror: https://depo.pardus.org.tr/pardus
    suite: {{ $suite }}-deb
{{ else }}
    components: [ main, multiverse, universe ]
    mirror: {{ if eq $arch "amd64" }}'https://archive.ubuntu.com/ubuntu'{{ else }}'https://ports.ubuntu.com/ubuntu-ports'{{ end }}
{{ end }}
    exclude:
    - "systemd-zram-generator"
    - "phosh-tour"

{{ if eq $base "pardus" }}

  - action: download
    url: {{ if eq $suite "yirmibes" }}'https://depo.pardus.org.tr/pardus/pool/main/p/pardus-archive-keyring/pardus-archive-keyring_2025.1_all.deb'{{ else }}'https://depo.pardus.org.tr/pardus/pool/main/p/pardus-archive-keyring/pardus-archive-keyring_2021.1_all.deb'{{ end }}
    name: pardus_archive_keyring
    filename: pardus_archive_keyring.deb

  - action: overlay
    description: Copy downloaded Pardus archive keyring
    origin: pardus_archive_keyring
    destination: /pardus_archive_keyring.deb

  - action: run
    chroot: true
    command: |
      DEBIAN_FRONTEND=noninteractive dpkg -i /pardus_archive_keyring.deb
      rm -f /pardus_archive_keyring.deb

  - action: run
    chroot: true
    script: scripts/all/setup-pardus.sh {{ $suite }}

{{ end }}

  - action: run
    description: Speed up dpkg/apt under QEMU emulation
    chroot: true
    command: |
      echo 'force-unsafe-io' > /etc/dpkg/dpkg.cfg.d/00-unsafe-io
      echo 'man-db man-db/auto-update boolean false' | debconf-set-selections
      echo 'APT::Acquire::Queue-Mode "host";'        > /etc/apt/apt.conf.d/00parallel
      echo 'APT::Acquire::http::Pipeline-Depth 5;'  >> /etc/apt/apt.conf.d/00parallel

  - action: apt
    recommends: false
    packages: [ apt-utils, eatmydata ]

  - action: run
    description: Configure eatmydata for subsequent apt/dpkg calls
    chroot: true
    command: |
      echo 'DPkg::Pre-Invoke  { "export LD_PRELOAD=/usr/lib/libeatmydata/libeatmydata.so"; };' \
        > /etc/apt/apt.conf.d/00eatmydata
      echo 'DPkg::Post-Invoke { "unset LD_PRELOAD || true"; };' \
        >> /etc/apt/apt.conf.d/00eatmydata

  - action: apt
    recommends: false
    packages:
      - bash-completion
      - bluez
      - ca-certificates
      - can-utils
      - console-setup
      - coreutils
      - curl
      - dialog
      - dnsmasq-base
      - dosfstools
      - ethtool
      - file
      - fuse
      - gawk
      - gnupg
      - gpg
      - gpiod
      - htop
      - hwinfo
      - i2c-tools
      - iptables-persistent
      - iputils-ping
      - isc-dhcp-client
      - kmod
      - less
      - locales
      - lrzsz
      - mc
      - nano
      - netfilter-persistent
      - network-manager
      - openssh-server
      - openssl
      - python3
      - rsync
      - spi-tools
      - ssh
      - sudo
      - systemd
      - systemd-sysv
      - tar
      - tree
      - tzdata
      - udev
      - unzip
      - usbutils
      - uuid-runtime
      - vim-tiny
      - wget
      - wpasupplicant
      - zip

  - action: apt
    recommends: false
    packages: [ iwd, systemd-timesyncd ]

{{ if eq $suite "noble" "bookworm" "yirmiuc" "yirmibes" }}
  - action: apt
    recommends: false
    packages: [ systemd-resolved ]
{{ end }}

{{ if eq $type "kiosk" }}
  - action: apt
    recommends: false
    packages:
      - kmscube
      - libdrm-dev
      - libxcb-cursor0
      - openbox
      - python3-pyqt5
      - python3-pyqtgraph
      - whiptail
      - x11-xserver-utils
      - xinit
      - xserver-xorg-core
      - xserver-xorg-input-all
{{ end }}

{{ if eq $type "tablet" }}

{{ if eq $base "pardus" }}

  - action: run
    chroot: true
    command: |
      cat <<EOF > /etc/apt/preferences.d/02-pardus-priority
      Package: *
      Pin: release o=Pardus
      Pin-Priority: 1002
      EOF

  - action: run
    chroot: true
    command: |
      cat <<EOF > /etc/apt/preferences.d/01-mobian-priority
      Package: *phosh*
      Pin: release o=mobian
      Pin-Priority: 1001
      EOF

{{ end }}

  - action: run
    description: Add Mobian apt key and repo
    chroot: true
    command: |
      curl -fsSL https://repo.mobian-project.org/mobian.gpg -o /usr/share/keyrings/mobian-archive-keyring.gpg
      echo "deb [signed-by=/usr/share/keyrings/mobian-archive-keyring.gpg] https://repo.mobian-project.org trixie main" > /etc/apt/sources.list.d/mobian.list
      apt-get update -y -qq

  - action: apt
    recommends: true
    packages:
      - gdm3
{{ if eq $suite "yirmibes" }}
      - gnome-shell-common=48.7-0+deb13u2
      - gnome-shell=48.7-0+deb13u2
{{ else }}
      - gnome-shell
{{ end }}
      - mobian-base
      - mobian-multimedia
      - mobian-phone-base
      - mobian-phosh
      - mobian-phosh-extras
      - mobian-phosh-phone
      - mobian-tweaks-phosh
      - phoc
      - phosh-mobile-settings
      - phosh-pim
      - phosh-plugins

  - action: apt
    recommends: false
    packages:
      - auditd
      - chatty
      - dconf-cli
      - endeavour
      - epiphany-browser
      - errands
      - evince
      - feedbackd
      - fonts-jetbrains-mono
      - fonts-noto-core
      - flatpak
      - geary
      - gnome-calculator
      - gnome-calendar
      - gnome-calls
      - gnome-clocks
      - gnome-console
      - gnome-contacts
      - gnome-control-center
      - gnome-maps
      - gnome-photos
      - gnome-settings-daemon
      - gnome-text-editor
      - gsettings-desktop-schemas
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - iio-sensor-proxy
      - kmscube
      - libdrm-dev
      - libinput-bin
      - libinput-tools
      - lollypop
      - loupe
      - megapixels
      - modemmanager
      - nautilus
      - network-manager-gnome
      - nftables
      - pipewire
      - pipewire-pulse
      - policycoreutils
      - selinux-basics
      - selinux-policy-default
      - selinux-utils
      - totem
      - upower
      - wayland-utils
      - wlr-randr
      - xdg-desktop-portal
      - xdg-desktop-portal-gnome
      - xwayland

{{ if eq $base "pardus" }}
  - action: apt
    recommends: true
    packages:
      - blanket
      - firefox-esr
      - firefox-esr-mobile-config
      - squeekboard
{{ end }}

{{ end }}

{{ if eq $type "desktop" }}

{{ if eq $suite "jammy" "noble" }}
  - action: apt
    recommends: false
    packages: [ adwaita-icon-theme-full ]
{{ end }}

  - action: apt
    recommends: true
    packages:
      - atril
      - catfish
      - libxfce4ui-utils
      - lightdm
      - lightdm-gtk-greeter
      - mousepad
      - network-manager
      - parole
      - ristretto
      - thunar
      - thunar-archive-plugin
      - xfce4-appfinder
      - xfce4-indicator-plugin
      - xfce4-panel
      - xfce4-pulseaudio-plugin
      - xfce4-session
      - xfce4-settings
      - xfce4-taskmanager
      - xfce4-terminal
      - xfce4-xkb-plugin
      - xfconf
      - xfdesktop4
      - xfwm4
      - xterm

  - action: apt
    recommends: false
    packages:
      - at-spi2-core
      - baobab
      - dbus-x11
      - engrampa
      - fonts-inter
      - fonts-inter-variable
      - fonts-jetbrains-mono
      - fonts-noto-core
      - kmscube
      - libdrm-dev
      - mate-calc
      - network-manager-gnome
      - whiptail
      - xcape

{{ if ne $suite "yirmibes" }}
  - action: apt
    recommends: false
    packages: [ software-properties-common ]
{{ end }}

  - action: run
    description: Install PiXflat theme from deb
    chroot: true
    command: |
      cd $(mktemp -d)
      wget http://archive.raspberrypi.org/debian/pool/main/p/pixflat-icons/pixflat-icons_0.26_all.deb
      DEBIAN_FRONTEND=noninteractive apt-get install -y ./pixflat-icons_0.26_all.deb

{{ end }}

  - action: run
    description: Setup host
    chroot: true
    command: |
      echo "{{ $machine }}" >/etc/hostname
      echo "127.0.0.1	localhost {{ $machine }}" >/etc/hosts

  - action: run
    description: Change distro issue message
    chroot: true
    command: |
      MSG="Gemstone {{ $type }}:{{ $release }}"
      echo "$MSG" >/etc/issue.net
      echo "$MSG\n" >/etc/issue

{{ if eq $type "desktop" }}
  - action: overlay
    source: overlays/{{ $type }}/all/etc/skel
    destination: /etc/skel
{{ end }}

  - action: run
    chroot: true
    script: scripts/all/setup-user.sh {{ $type }}

  - action: overlay
    source: overlays/minimal/all
    destination: /

  - action: overlay
    source: overlays/minimal/{{ $machine }}
    destination: /

  - action: run
    chroot: true
    script: scripts/{{ $machine }}/install-local-apt.sh {{ $machine }} {{ $type }} {{ $ci }}

{{ if eq $type "desktop" }}
{{ if eq $machine "beagley-ai" "t3-gem-o1" }}
  - action: run
    description: Install t3-gem-vnc from deb
    chroot: true
    command: |
      cd $(mktemp -d)
      wget "https://packages.t3gemstone.org/apt/gemstone/pool/main/t/t3-gem-vnc/t3-gem-vnc_0.0.1-1_all.deb"
      DEBIAN_FRONTEND=noninteractive apt-get install -y ./t3-gem-vnc_0.0.1-1_all.deb
{{ end }}
{{ end }}

{{ if eq $machine "beagley-ai" }}

{{ if eq $ci "false" }}
  - action: run
    chroot: true
    script: scripts/beagley-ai/install-bootfiles.sh {{ $workdir }} $ROOTDIR
{{ end }}

  - action: run
    chroot: true
    script: scripts/beagley-ai/setup-bootfiles.sh

  - action: run
    chroot: false
    script: scripts/beagley-ai/install-firmware.sh {{ $workdir }} $ROOTDIR
{{ end }}

{{ if eq $machine "t3-gem-o1" }}

{{ if eq $ci "false" }}
  - action: run
    chroot: false
    script: scripts/t3-gem-o1/install-bootfiles.sh {{ $workdir }} $ROOTDIR
{{ end }}

  - action: run
    chroot: true
    script: scripts/t3-gem-o1/setup-bootfiles.sh

  - action: run
    chroot: false
    script: scripts/t3-gem-o1/install-firmware.sh {{ $workdir }} $ROOTDIR
{{ end }}

{{ if eq $type "kiosk" "desktop" "tablet" }}
  - action: overlay
    source: overlays/{{ $type }}/all
    destination: /

  - action: overlay
    source: overlays/{{ $type }}/{{ $machine }}
    destination: /
{{ end }}

{{ if eq $type "desktop" }}
  - action: run
    chroot: true
    script: scripts/custom/install-firefox.sh

  - action: run
    chroot: true
    script: scripts/custom/install-vscode.sh

  - action: run
    description: Create icon cache
    chroot: true
    command: |
      gtk-update-icon-cache --force --ignore-theme-index /usr/share/icons/T3-Gemstone
      gtk-update-icon-cache --force --ignore-theme-index /usr/share/icons/hicolor
{{ end }}

{{ if eq $machine "beagley-ai" "t3-gem-o1" }}
  - action: overlay
    source: overlays/minimal/usb-gadgets
    destination: /
{{ end }}

{{ if eq $type "tablet" }}

  - action: run
    description: Configure SELinux
    chroot: true
    script: scripts/tablet/configure-selinux.sh

  - action: run
    description: Restore Flatpak cache from host
    chroot: false
    script: scripts/tablet/flatpak-cache-restore.sh {{ $workdir }} $ROOTDIR

  - action: run
    description: Setup Flatpak with Flathub and install apps
    chroot: true
    script: scripts/tablet/setup-flatpak.sh

  - action: run
    description: Save Flatpak data to host cache
    chroot: false
    script: scripts/tablet/flatpak-cache-save.sh {{ $workdir }} $ROOTDIR

  - action: run
    description: Generate root credentials and SSH keypair
    chroot: false
    script: scripts/tablet/setup-root-credentials.sh {{ $workdir }} $ROOTDIR {{ $image }}

  - action: run
    description: Enable security services
    chroot: true
    script: scripts/tablet/setup-services.sh

  - action: run
    description: Compile dconf system database
    chroot: true
    command: dconf update

{{ end }}

  - action: run
    chroot: true
    script: scripts/all/setup-permissions.sh {{ $type }}

  - action: run
    chroot: true
    script: scripts/all/setup-networking.sh {{ $machine }} {{ $suite }}

{{ if ne $machine "qemuarm64" }}
  - action: run
    chroot: true
    script: scripts/all/setup-gemstone-apt.sh {{ $machine }} {{ $suite }}
{{ end }}

  - action: run
    chroot: true
    script: scripts/all/setup-services.sh

  - action: run
    chroot: true
    script: scripts/{{ $machine }}/setup-services.sh

  - action: run
    chroot: true
    script: scripts/all/disable-services.sh {{ $type }} {{ $machine }}

  - action: run
    chroot: true
    script: scripts/{{ $machine }}/clean-up.sh {{ $type }}

{{ if eq $type "tablet" }}
  - action: run
    description: Compile dconf system database
    chroot: true
    command: dconf update
{{ end }}

  - action: run
    chroot: true
    script: scripts/all/clean-up.sh {{ $type }} {{ $base }}

  - action: run
    chroot: true
    script: scripts/all/setup-info.sh {{ $type }} {{ $release }}

  - action: image-partition
    imagename: {{ $image }}
    imagesize: {{ $imagesize }}
{{ if eq $machine "beagley-ai" "t3-gem-o1" "qemuarm64" }}
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot
        partition: BOOT
    partitions:
      - name: BOOT
        fs: vfat
        start: 1MiB
        end: 129MiB
        extendedoptions: [-g, 16/32, -h, 0]
        flags: [boot, lba]
        parttype: 0C
      - name: root
        fs: btrfs
        start: 129MiB
        end: 100%
        parttype: 83
{{ else if eq $arch "amd64" }}
    partitiontype: gpt
    partitions:
      - name: efi
        fs: vfat
        start: 0%
        end: 50MB
        options: [ x-systemd.automount ]
      - name: root
        fs: ext4
        start: 50MB
        end: 100%
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot/efi
        partition: efi
        flags: [ boot ]
{{ end }}

  - action: filesystem-deploy
    description: Deploying filesystem onto image
