version: '3'

tasks:
  publish-debs:
    desc: Publish the latest DEB files to the package repository
    cmds:
      - utils/publish-debs.sh {{ .DEB_DIR }} {{ .REPO_NAME }} {{ .DISTRO }}
    requires:
        vars:
          - name: DEB_DIR
          - name: REPO_NAME
            enum: [ beagley-ai, intel-corei7-64, t3-gem-o1, gemstone ]
          - name: DISTRO
            enum:
              - bsp          # kernel, bootloader and firmware packages
              - jammy        # Ubuntu 22
              - noble        # Ubuntu 24
              - bullseye     # Debian 11
              - bookworm     # Debian 12
              - yirmiuc      # Pardus 23
              - yirmibes     # Pardus 25

  encrypt-image:
    desc: Encrypt the image file with LUKS
    cmds:
      - sudo utils/encrypt-image.sh {{ .IMG_FILE_PATH }}
    requires:
        vars:
          - name: IMG_FILE_PATH
